name: Refresh Manifest Cache

on:
  push:
    branches: [main]
    paths:
      - 'docs/.vitepress/public/manifest.json'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Worker refresh
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ -z "$WORKER_URL" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "Missing WORKER_URL or REFRESH_TOKEN secret"
            exit 1
          fi

          echo "Refreshing manifest cache..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST -H "Authorization: Bearer $REFRESH_TOKEN" "$WORKER_URL/refresh-manifest")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Manifest cache refreshed successfully!"
          else
            echo "Failed to refresh manifest cache"
            exit 1
          fi
